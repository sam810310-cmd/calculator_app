apiVersion: apps/v1
kind: Deployment
metadata:
  name: unified-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unified
  template:
    metadata:
      labels:
        app: unified
    spec:
      containers:
      - name: unified
        image: localhost/unified:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: unified-service
spec:
  selector:
    app: unified
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
